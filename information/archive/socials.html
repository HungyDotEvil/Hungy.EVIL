<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Known Pseudonyms</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #2b1055, #1b1f3b, #0f3460);
      --card-bg: rgba(255, 255, 255, 0.08);
      --accent: #ff7ac6;
      --accent-soft: #6dd6ff;
      --text-main: #f2f2f2;
      --text-muted: #c7c7d1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 70px 20px 30px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    header p {
      color: var(--text-muted);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 50px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: var(--accent);
    }

    main {
      max-width: 800px;
      margin: auto;
      padding: 0 20px 120px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 35px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .social-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 20px;
    }

    .social {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .social:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }

    .social-info {
      display: flex;
      flex-direction: column;
    }

    .platform {
      font-weight: 600;
      color: var(--accent-soft);
    }

    .handle {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .social a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 18px;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Socials</h1>
    <p>Public media accounts in which I post things</p>
  </header>

  <nav>
    <a href="../../index.html">Home</a>
    <a href="archive.html">Archive</a>
	<a href="socials.html">Socials</a>
  </nav>

  <main>
    <div class="card">
      <div class="social-list">

        <div class="social">
          <div class="social-info">
            <span class="platform">Twitch</span>
            <span class="handle">@hungydotevil</span>
          </div>
          <a href="https://www.twitch.tv/hungydotevil" target="_blank"><img src="yabadabadooda/gifsistole/eviltower.gif"></a>
        </div>

        <div class="social">
          <div class="social-info">
            <span class="platform">YouTube</span>
            <span class="handle">@eviltheskater</span>
          </div>
          <a href="https://www.youtube.com/@eviltheskater" target="_blank"><img src="yabadabadooda/gifsistole/statictv1.gif"></a>
        </div>

        <div class="social">
          <div class="social-info">
            <span class="platform">Instagram</span>
            <span class="handle">@hungy.evil</span>
          </div>
          <a href="https://www.instagram.com/hungy.evil" target="_blank"><img src="yabadabadooda/gifsistole/stuff.gif"></a>
        </div>

      </div>
    </div>
  </main>

 <footer>
    <p>
      Contact: <a href="mailto:poetictyranthungy@gmail.com">poetictyranthungy@gmail.com</a>
    </p>
    <p>© 2025 Hungy · Work in progress</p>
  </footer>

</body>
</html>
