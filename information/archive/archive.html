<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archive</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #2b1055, #1b1f3b, #0f3460);
      --card-bg: rgba(255, 255, 255, 0.08);
      --accent: #ff7ac6;
      --accent-soft: #6dd6ff;
      --text-main: #f2f2f2;
      --text-muted: #c7c7d1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 70px 20px 30px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    header p {
      color: var(--text-muted);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 50px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: var(--accent);
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 0 20px 120px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 35px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .archive-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .archive-item {
      background: rgba(255, 255, 255, 0.06);
      padding: 25px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text-main);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .archive-item:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-3px);
    }

    .archive-item h3 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      color: var(--accent-soft);
    }

    .archive-item p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .wip {
      background-color: yellow;
      color: black;
      padding: 2px 6px;
      font-weight: bold;
    }
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 18px;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>

  <header>
    <h1>Archive</h1>
    <p>Organized collections and stored media</p>
  </header>

  <nav>
    <a href="../../index.html">Home</a>
    <a href="socials.html">Socials</a>
    <a href="archive.html">Archive</a>
  </nav>

  <main>
    <div class="card">
      <div class="archive-list">

        <a class="archive-item" href="images.html">
          <h3>Images</h3>
          <p>Visual media, artwork, and captures</p>
        </a>

        <a class="archive-item" href="videos.html">
          <h3>Videos</h3>
          <p>Clips, edits, and miscellaneous footage</p>
        </a>

        <a class="archive-item" href="sounds.html">
          <h3>Sounds</h3>
          <p>Audio files, demos, etc.</p>
        </a>

      </div>
    </div>
  </main>

<footer>
  <p>
    Contact: <a href="mailto:poetictyranthungy@gmail.com">
      poetictyranthungy@gmail.com
    </a>
  </p>

  <p>© 2025 Hungy · <span class="wip">Work in progress</span></p>
</footer>

</body>
</html>
